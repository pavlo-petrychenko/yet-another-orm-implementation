services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: mini_shop
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d mini_shop"]
      interval: 2s
      timeout: 5s
      retries: 20
    volumes:
      - postgres_data:/var/lib/postgresql/data

  migrate:
    build:
      context: ../..
      dockerfile: examples/mini-shop/Dockerfile
    image: yaoi-example-mini-shop
    environment:
      PGHOST: postgres
      PGPORT: "5432"
      PGUSER: postgres
      PGPASSWORD: postgres
      PGDATABASE: mini_shop
    depends_on:
      postgres:
        condition: service_healthy
    command: ["npm", "run", "migrate:up"]
    restart: "no"

  seed:
    image: yaoi-example-mini-shop
    environment:
      PGHOST: postgres
      PGPORT: "5432"
      PGUSER: postgres
      PGPASSWORD: postgres
      PGDATABASE: mini_shop
    depends_on:
      migrate:
        condition: service_completed_successfully
    command: ["npm", "run", "seed"]
    restart: "no"

  api:
    image: yaoi-example-mini-shop
    environment:
      PGHOST: postgres
      PGPORT: "5432"
      PGUSER: postgres
      PGPASSWORD: postgres
      PGDATABASE: mini_shop
      PORT: "3000"
    ports:
      - "3000:3000"
    depends_on:
      seed:
        condition: service_completed_successfully

volumes:
  postgres_data:
